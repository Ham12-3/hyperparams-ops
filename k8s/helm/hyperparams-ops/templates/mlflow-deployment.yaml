apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlflow
  namespace: {{ .Values.namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mlflow
  template:
    metadata:
      labels:
        app: mlflow
    spec:
      containers:
        - name: mlflow
          image: {{ .Values.mlflow.image }}
          ports:
            - containerPort: 5000
          envFrom:
            - configMapRef:
                name: hyperparams-config
          resources:
            requests:
              cpu: {{ .Values.mlflow.resources.requests.cpu }}
              memory: {{ .Values.mlflow.resources.requests.memory }}
            limits:
              cpu: {{ .Values.mlflow.resources.limits.cpu }}
              memory: {{ .Values.mlflow.resources.limits.memory }}
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: mlflow
  namespace: {{ .Values.namespace }}
spec:
  selector:
    app: mlflow
  ports:
    - port: 5000
      targetPort: 5000
